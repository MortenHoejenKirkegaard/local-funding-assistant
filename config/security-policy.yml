allowed_root: "/Users/mortenkirkegaard/Desktop/Codex Access"

filesystem:
  deny_by_default: true
  allow_read:
    - "/Users/mortenkirkegaard/Desktop/Codex Access"
  allow_write:
    - "/Users/mortenkirkegaard/Desktop/Codex Access"
  deny_external_paths: true
  deny_symlink_escape: true
  quarantine_dropped_files: true

network:
  api_calls_default: "ask_first"
  outbound_allowlist:
    - "api.openai.com"
    - "github.com"
    - "hooks.slack.com"
  require_approval_for_new_hosts: true

notifications:
  allow_confidential_content_in_email: false
  allow_confidential_content_in_slack: false
  dashboard_can_show_confidential_content: true

ingestion:
  allowed_drop_zone: "funding-assistant/system/inbox"
  allowed_destination_root: "funding-assistant/cases"
  require_project_selection: true
  require_company_selection: true
  preserve_original_filename: true
  compute_sha256_before_move: true
  index_after_move: true
  supported_extensions:
    - ".doc"
    - ".docx"
    - ".xls"
    - ".xlsx"
    - ".ppt"
    - ".pptx"
    - ".pdf"
    - ".txt"
    - ".md"
    - ".csv"
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".tif"
    - ".tiff"
