allowed_root: "/Users/mortenkirkegaard/Desktop/Codex Access"

filesystem:
  deny_by_default: true
  allow_read:
    - "/Users/mortenkirkegaard/Desktop/Codex Access"
  allow_write:
    - "/Users/mortenkirkegaard/Desktop/Codex Access"
  deny_external_paths: true
  deny_symlink_escape: true
  quarantine_dropped_files: true

external_collaborators:
  enabled: false
  default_access: "deny"
  require_named_identity: true
  require_case_scope: true
  allowed_root_template: "/Users/mortenkirkegaard/Desktop/Codex Access/funding-assistant/external/{external_user_id}"
  can_only_follow_assigned_flow: true
  allow_dashboard_admin: false
  allow_agent_controls: false
  allow_api_calls: false
  allow_scraper_access: false
  allow_writing_agent: false
  allow_cross_company_access: false
  allow_downloads: false
  allow_delete: false
  allow_rename: false
  allow_reallocation: false
  allowed_actions:
    - "view_assigned_flow"
    - "upload_to_assigned_folder"
    - "answer_flow_questions"
    - "submit_to_owner_review"
  all_submissions_require_owner_review: true
  external_routes_must_start_with: "/external/"

network:
  api_calls_default: "ask_first"
  external_actions_default: "deny"
  outbound_allowlist:
    - "api.openai.com"
    - "hooks.slack.com"
  require_approval_for_new_hosts: true
  read_only_web_access: true

data_sharing:
  default: "deny"
  allow_external_data_sharing: false
  allow_public_uploads: false
  allow_third_party_file_uploads: false
  allow_prompt_or_document_logging_to_external_services: false
  allow_training_data_sharing: false
  allow_clipboard_export_to_external_apps: false
  only_allowed_external_output_channel: "slack"
  slack_recipient_must_be_owner: true
  slack_max_confidentiality: "non_confidential_summary"
  slack_allowed_content:
    - "status"
    - "deadline"
    - "match_score"
    - "missing_requirements_summary"
    - "recommended_next_action"
    - "dashboard_reference"
  blocked_content:
    - "full_documents"
    - "document_chunks"
    - "patent_claims"
    - "full_application_drafts"
    - "personal_data"
    - "commercially_sensitive_details"
    - "card_details"
    - "login_details"
    - "api_keys"
    - "secrets"

spending:
  allow_payments: false
  allow_card_use: false
  allow_checkout: false
  allow_subscriptions: false
  allow_paid_api_plan_changes: false
  monthly_budget_usd_requires_manual_setting: true
  require_user_approval_for_each_api_spend: true
  hard_stop_when_budget_reached: true

external_actions:
  allow_contracts: false
  allow_signatures: false
  allow_terms_acceptance: false
  allow_account_creation: false
  allow_purchases: false
  allow_bank_or_card_access: false
  allow_calendar_invites_to_external_parties: false
  allow_external_form_submission: false
  allow_email_sending: false
  allow_slack_sending: true
  slack_output_only: true
  allow_data_sharing_except_owner_slack: false
  require_human_to_send_external_messages: true
  blocked_action_keywords:
    - "buy"
    - "purchase"
    - "checkout"
    - "subscribe"
    - "upgrade"
    - "accept terms"
    - "sign"
    - "contract"
    - "agreement"
    - "submit application"
    - "send application"
    - "create account"
    - "enter card"
    - "payment"
    - "invoice"
    - "upload file"
    - "share document"
    - "send document"
    - "export data"
    - "forward"

notifications:
  email_enabled: false
  slack_enabled: true
  allow_confidential_content_in_email: false
  allow_confidential_content_in_slack: false
  dashboard_can_show_confidential_content: true
  allowed_external_output_channels:
    - "slack"
  slack_output_format: "summary_with_dashboard_reference"

ingestion:
  allowed_drop_zone: "funding-assistant/system/inbox"
  allowed_destination_root: "funding-assistant/cases"
  require_project_selection: true
  require_company_selection: true
  preserve_original_filename: true
  compute_sha256_before_move: true
  index_after_move: true
  supported_extensions:
    - ".doc"
    - ".docx"
    - ".xls"
    - ".xlsx"
    - ".ppt"
    - ".pptx"
    - ".pdf"
    - ".txt"
    - ".md"
    - ".csv"
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".tif"
    - ".tiff"

funding_screening:
  max_frequency: "weekly"
  default_day: "monday"
  default_local_time: "07:00"
