services:
  postgres:
    image: postgres:16-alpine
    container_name: funding-assistant-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-funding_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-funding_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-funding_assistant} -d ${POSTGRES_DB:-funding_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: funding-assistant-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - ./qdrant-storage:/qdrant/storage

